<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Painel - Dra. Emanoela</title>
  </head>
  <body>
    <script>
      // If there's an identity token in the URL, send back to home immediately
      (function () {
        const fullUrl = `${window.location.search || ''}${window.location.hash || ''}`;
        if (/(invite_token|recovery_token|confirmation_token|email_change_token)=/.test(fullUrl)) {
          // Use href instead of replace - href is more reliable
          window.location.href = `/${fullUrl}`;
          // Double-check with replace as backup
          setTimeout(() => {
            window.location.replace(`/${fullUrl}`);
          }, 100);
        }
      })();
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
