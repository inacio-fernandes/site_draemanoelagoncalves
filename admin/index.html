<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Painel - Dra. Emanoela</title>
  </head>
  <body>
    <script>
      (function () {
        const tokenPattern = /(invite_token|recovery_token|confirmation_token|email_change_token)=/;
        const tokenSource = `${window.location.search || ''}${window.location.hash || ''}`;
        if (tokenPattern.test(tokenSource)) {
          window.location.replace(`/${window.location.search || ''}${window.location.hash || ''}`);
        }
      })();
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
